ci:
    autofix_prs: false
    skip: [legacy_precommit]

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-ast
    -   id: check-yaml
    -   id: check-json
    -   id: end-of-file-fixer
    -   id: mixed-line-ending
    -   id: pretty-format-json
        args: [--autofix]
    -   id: trailing-whitespace
-   repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.3.1
    hooks:
    -  id: black
-   repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
    -   id: flake8
        exclude: ^alembic/
-   repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
    - id: isort
      name: isort (python)
      args: ["--profile", "black"]
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
    -   id: mypy
        args: ["--strict"]
        additional_dependencies: [alembic==1.14.0, mutagen==1.47.0, sqlalchemy==2.0.36]
        exclude: ^alembic/
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.7
  hooks:
    # Only use ruff for pep8-naming for now.
    # Consider using it to replace the other tooling later.
    - id: ruff
      args: [--fix]
-   repo: local
    hooks:
    # TODO: Everything should be migrated out of this legacy precommit step.
    -   id: legacy_precommit
        name: legacy_precommit
        entry: python pre-commit.py
        language: system
        always_run: true
        pass_filenames: false
